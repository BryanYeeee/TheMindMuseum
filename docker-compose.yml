services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: unless-stopped

  debug-client:
    build: ./debug-client
    ports:
      - "3001:3001"
    volumes:
      - ./debug-client:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
