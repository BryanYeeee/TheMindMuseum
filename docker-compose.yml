services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    depends_on:
      - backend
    restart: unless-stopped

  debug-client:
    build: ./debug-frontend
    ports:
      - "3001:3001"
    volumes:
      - ./debug-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
