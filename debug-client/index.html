<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug — Generate World</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 24px; }
    h1 { font-size: 18px; margin-bottom: 16px; color: #569cd6; }
    h2 { font-size: 14px; margin: 16px 0 8px; color: #9cdcfe; }
    .row { display: flex; gap: 24px; }
    .col { flex: 1; min-width: 0; }
    textarea { width: 100%; height: 200px; background: #2d2d2d; color: #d4d4d4; border: 1px solid #444; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 13px; resize: vertical; }
    input[type="file"] { margin: 8px 0; }
    button { background: #0e639c; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 13px; margin-top: 8px; }
    button:hover { background: #1177bb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #events { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 12px; min-height: 120px; max-height: 300px; overflow-y: auto; font-size: 12px; white-space: pre-wrap; }
    #result { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 12px; min-height: 200px; max-height: 600px; overflow-y: auto; font-size: 12px; white-space: pre-wrap; }
    .event-line { margin-bottom: 4px; }
    .event-line.queued { color: #888; }
    .event-line.summarizing { color: #dcdcaa; }
    .event-line.generating_models { color: #ce9178; }
    .event-line.assembling { color: #b5cea8; }
    .event-line.completed { color: #6a9955; }
    .event-line.failed { color: #f44747; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; margin-left: 8px; }
    .status-badge.idle { background: #333; }
    .status-badge.running { background: #0e639c; }
    .status-badge.done { background: #6a9955; }
    .status-badge.error { background: #f44747; }
    .tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .tab { padding: 4px 12px; background: #2d2d2d; border: 1px solid #444; border-radius: 4px 4px 0 0; cursor: pointer; font-size: 12px; }
    .tab.active { background: #1a1a1a; border-bottom-color: #1a1a1a; color: #569cd6; }
    .section { margin-bottom: 16px; }
    .api-url { font-size: 11px; color: #888; margin-bottom: 8px; }
    label { font-size: 12px; color: #9cdcfe; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>🛠 Debug — Generate World <span id="statusBadge" class="status-badge idle">idle</span></h1>

  <div class="api-url">Backend: <span id="apiBase">http://localhost:5000</span></div>

  <div class="section">
    <label>Custom backend URL (optional):</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:5000" style="background:#2d2d2d;color:#d4d4d4;border:1px solid #444;padding:4px 8px;font-family:monospace;font-size:12px;width:300px;border-radius:4px;" />
  </div>

  <div class="row">
    <div class="col">
      <h2>Input</h2>
      <div class="tabs">
        <div class="tab active" data-tab="text" onclick="switchTab('text')">Text</div>
        <div class="tab" data-tab="pdf" onclick="switchTab('pdf')">PDF Upload</div>
      </div>

      <div id="tab-text">
        <textarea id="textInput" placeholder="Paste study material here..."></textarea>
      </div>
      <div id="tab-pdf" style="display:none;">
        <input type="file" id="pdfInput" accept=".pdf" />
        <div id="pdfName" style="font-size:12px;color:#888;margin-top:4px;"></div>
      </div>

      <button id="sendBtn" onclick="sendRequest()">Generate World</button>
    </div>

    <div class="col">
      <h2>SSE Events</h2>
      <div id="events"><span style="color:#555;">Events will appear here...</span></div>
    </div>
  </div>

  <h2 style="margin-top:24px;">Result</h2>
  <div id="result"><span style="color:#555;">Waiting for completed event...</span></div>

  <script>
    let currentTab = 'text';

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('tab-text').style.display = tab === 'text' ? '' : 'none';
      document.getElementById('tab-pdf').style.display = tab === 'pdf' ? '' : 'none';
    }

    function getBase() {
      return document.getElementById('backendUrl').value.trim() || 'http://localhost:5000';
    }

    function setBadge(state, label) {
      const b = document.getElementById('statusBadge');
      b.className = 'status-badge ' + state;
      b.textContent = label;
    }

    function addEvent(data) {
      const el = document.getElementById('events');
      if (el.querySelector('span')) el.innerHTML = '';
      const line = document.createElement('div');
      line.className = 'event-line ' + (data.status || '');
      const ts = new Date().toLocaleTimeString();
      line.textContent = `[${ts}] ${JSON.stringify(data)}`;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    async function sendRequest() {
      const btn = document.getElementById('sendBtn');
      const eventsEl = document.getElementById('events');
      const resultEl = document.getElementById('result');

      btn.disabled = true;
      eventsEl.innerHTML = '';
      resultEl.innerHTML = '<span style="color:#555;">Waiting...</span>';
      setBadge('running', 'sending...');

      const base = getBase();
      let body;
      let headers = {};

      if (currentTab === 'text') {
        const text = document.getElementById('textInput').value.trim();
        if (!text) { alert('Enter some text'); btn.disabled = false; setBadge('idle', 'idle'); return; }
        body = JSON.stringify({ text });
        headers['Content-Type'] = 'application/json';
      } else {
        const file = document.getElementById('pdfInput').files[0];
        if (!file) { alert('Select a PDF'); btn.disabled = false; setBadge('idle', 'idle'); return; }
        body = new FormData();
        body.append('pdf', file);
      }

      try {
        const res = await fetch(`${base}/api/generate-world`, {
          method: 'POST',
          headers: currentTab === 'text' ? headers : {},
          body
        });
        const json = await res.json();

        if (!res.ok) {
          addEvent({ error: json.error || res.statusText });
          setBadge('error', 'error');
          btn.disabled = false;
          return;
        }

        const jobId = json.job_id;
        addEvent({ status: 'job_created', job_id: jobId });
        setBadge('running', 'streaming...');

        // Connect SSE
        const eventSource = new EventSource(`${base}/api/jobs/${jobId}/events`);

        eventSource.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            addEvent(data);

            if (data.status === 'completed') {
              setBadge('done', 'completed');
              resultEl.textContent = JSON.stringify(data.result, null, 2);
              eventSource.close();
              btn.disabled = false;
            } else if (data.status === 'failed') {
              setBadge('error', 'failed');
              resultEl.textContent = JSON.stringify(data, null, 2);
              eventSource.close();
              btn.disabled = false;
            } else {
              setBadge('running', data.status);
            }
          } catch (err) {
            addEvent({ raw: e.data });
          }
        };

        eventSource.onerror = () => {
          addEvent({ error: 'SSE connection lost' });
          setBadge('error', 'disconnected');
          eventSource.close();
          btn.disabled = false;
        };

      } catch (err) {
        addEvent({ error: err.message });
        setBadge('error', 'error');
        btn.disabled = false;
      }
    }

    // Show PDF name on selection
    document.getElementById('pdfInput').addEventListener('change', (e) => {
      document.getElementById('pdfName').textContent = e.target.files[0]?.name || '';
    });
  </script>
</body>
</html>
